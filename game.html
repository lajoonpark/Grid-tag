<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Tag</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section id="config-view" class="config-view" aria-label="Game configuration">
      <header class="config-header">
        <h1 class="page-title">Configure Match</h1>
        <p class="page-subtitle">Choose controls and settings, then press Start.</p>
      </header>

      <div class="config-bar">
        <div class="hover-menu" id="controls-menu-wrap">
          <button id="controls-menu-btn" type="button" class="menu-trigger">Controls</button>
          <div class="hover-panel" id="controls-panel" role="group" aria-label="Controls menu">
            <button id="role-toggle-btn" type="button" class="panel-btn">Play as Chaser</button>
            <button id="config-menu-btn" type="button" class="panel-btn btn-menu-back">&#8592; Back to Menu</button>
          </div>
        </div>

        <div class="hover-menu" id="settings-menu-wrap">
          <button id="settings-menu-btn" type="button" class="menu-trigger">Settings</button>
          <div class="hover-panel" id="settings-panel" role="group" aria-label="Settings menu">
            <label class="difficulty-picker" for="difficulty-select">
              <span class="label">CPU Difficulty</span>
              <select id="difficulty-select">
                <option value="normal">Normal</option>
                <option value="hard">Hard</option>
                <option value="insane">Insane</option>
                <option value="demon">Demon</option>
              </select>
            </label>
          </div>
        </div>

        <button id="start-btn" type="button" class="start-btn">Start</button>
      </div>

      <section id="custom-setup-panel" class="custom-setup-panel" aria-label="Custom mode setup" hidden>
        <label class="difficulty-picker" for="custom-runners-input">
          <span class="label">Runners</span>
          <input id="custom-runners-input" type="number" min="1" value="2" />
        </label>
        <label class="difficulty-picker" for="custom-chasers-input">
          <span class="label">Chasers</span>
          <input id="custom-chasers-input" type="number" min="1" value="2" />
        </label>
        <label class="difficulty-picker" for="custom-human-one-role-select">
          <span class="label">Human 1 Role</span>
          <select id="custom-human-one-role-select">
            <option value="runner">Runner</option>
            <option value="chaser">Chaser</option>
          </select>
        </label>
        <label class="difficulty-picker" for="custom-human-two-role-select">
          <span class="label">Human 2 Role</span>
          <select id="custom-human-two-role-select">
            <option value="chaser">Chaser</option>
            <option value="runner">Runner</option>
          </select>
        </label>
        <label class="difficulty-picker" for="custom-human-count-input">
          <span class="label">Human-Controlled</span>
          <input id="custom-human-count-input" type="number" min="1" max="2" value="1" />
        </label>
        <label class="difficulty-picker" for="custom-cpu-count-input">
          <span class="label">CPU-Controlled</span>
          <input id="custom-cpu-count-input" type="number" min="0" value="3" />
        </label>
        <label class="difficulty-picker" for="custom-difficulty-select">
          <span class="label">CPU Difficulty</span>
          <select id="custom-difficulty-select">
            <option value="normal">Normal</option>
            <option value="hard">Hard</option>
            <option value="insane">Insane</option>
            <option value="demon">Demon</option>
          </select>
        </label>
        <p id="custom-validation-message" class="custom-validation-message" role="status"></p>
        <p id="custom-summary-value" class="custom-summary-value"></p>
      </section>

      <section class="status-panel" aria-label="Round status">
        <h2 id="result-value">Press Start</h2>
      </section>
    </section>

    <section id="gameplay-view" class="gameplay-view" aria-label="Gameplay" hidden>
      <header class="hud" aria-label="Game HUD">
        <div class="hud-stats">
          <div class="hud-item">
            <span class="label">Mode</span>
            <strong id="mode-value">SINGLE PLAYER</strong>
          </div>
          <div class="hud-item">
            <span class="label">Role</span>
            <strong id="role-value">Blue: RUNNER | Red: CHASER</strong>
          </div>
          <div class="hud-item">
            <span class="label">Difficulty</span>
            <strong id="difficulty-value">NORMAL</strong>
          </div>
          <div class="hud-item">
            <span class="label">Timer</span>
            <strong id="timer-value">60s</strong>
          </div>
          <div class="hud-item">
            <span class="label">Score (Runner-Chaser)</span>
            <strong id="score-value">0-0</strong>
          </div>
          <div class="hud-item">
            <span class="label">Active (Runners-Chasers)</span>
            <strong id="active-counts-value">1-1</strong>
          </div>
        </div>

        <div class="hud-controls">
          <button id="pause-btn" type="button">Pause</button>
          <button id="continue-btn" type="button">Continue</button>
          <button id="restart-round-btn" type="button">Restart Round</button>
          <button id="back-config-btn" type="button">Back to Configurations</button>
          <button id="menu-btn" type="button" class="btn-menu-back">&#8592; Back to Menu</button>
        </div>
      </header>

      <section class="game-area" aria-label="Grid chase game area">
        <div id="grid" class="grid" role="grid" aria-label="30 by 30 game grid"></div>
        <div id="round-overlay" class="round-overlay" hidden>
          <div class="overlay-card">
            <h3 id="overlay-title">Round Over</h3>
            <p id="overlay-message"></p>
            <div class="overlay-actions">
              <button id="overlay-restart-btn" type="button">Play Again</button>
              <button id="overlay-close-btn" type="button">Close</button>
              <button id="overlay-config-btn" type="button">Back to Configurations</button>
              <button id="overlay-menu-btn" type="button" class="btn-menu-back">&#8592; Back to Menu</button>
            </div>
          </div>
        </div>
      </section>
    </section>

    <div id="countdown-screen" class="countdown-screen" hidden>
      <div id="countdown-screen-value" class="countdown-screen-value">3</div>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
