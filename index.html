<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Tag</title>
  <link rel="stylesheet" href="menu.css" />
</head>
<body>
  <div class="menu-shell">

    <!-- Hero -->
    <header class="menu-hero">
      <h1 class="hero-title">
        <span class="title-grid">GRID</span>&nbsp;<span class="title-tag">TAG</span>
      </h1>
      <p class="hero-sub">Run. If you dare&hellip;</p>
    </header>

    <!-- Primary actions -->
    <div class="menu-buttons">

      <!-- Mode pill (expandable) -->
      <div class="mode-group" id="mode-group">
        <div class="mode-pill" id="mode-pill" tabindex="0" aria-label="Select game mode">
          <div class="mode-pill__header" aria-hidden="true">Mode</div>
          <div class="mode-pill__sep"></div>
          <div class="mode-pill__opts" role="list">

            <div class="mode-opt-row" role="listitem">
              <button class="mode-opt" id="opt-cpu" type="button"
                      aria-haspopup="true" aria-expanded="false">CPU</button>
            </div>

            <div class="mode-opt-row" role="listitem">
              <button class="mode-opt" id="opt-multi" type="button"
                      aria-haspopup="true" aria-expanded="false">Multiplayer</button>
            </div>

            <div class="mode-opt-row" role="listitem">
              <button class="mode-opt" id="opt-custom" type="button">Custom</button>
            </div>

          </div>
        </div>

        <!-- CPU difficulty sub-panel -->
        <div class="sub-panel" id="sub-cpu" role="group" aria-label="CPU difficulty">
          <button class="sub-btn" type="button"
                  onclick="launchGame('single-player','normal')">Normal</button>
          <button class="sub-btn" type="button"
                  onclick="launchGame('single-player','hard')">Hard</button>
          <button class="sub-btn" type="button"
                  onclick="launchGame('single-player','insane')">Insane</button>
          <button class="sub-btn" type="button"
                  onclick="launchGame('single-player','demon')">Demon</button>
        </div>

        <!-- Multiplayer size sub-panel -->
        <div class="sub-panel" id="sub-multi" role="group" aria-label="Multiplayer size">
          <button class="sub-btn" type="button"
                  onclick="launchGame('1v1')">1v1</button>
          <button class="sub-btn" type="button"
                  onclick="launchGame('2v2')">2v2</button>
          <button class="sub-btn" type="button"
                  onclick="launchGame('3v3')">3v3</button>
        </div>
      </div>

      <!-- How to Play pill -->
      <a class="htp-pill" href="how-to-play.html">How to Play</a>

    </div>
  </div>

  <script src="menu.js"></script>
</body>
</html>
